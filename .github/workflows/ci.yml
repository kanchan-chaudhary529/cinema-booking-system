name: HCBS CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      # SETUP stage
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint pytest pytest-html pytest-cov autopep8 bandit safety

      # LINT & CODE QUALITY stage
      - name: Run flake8
        run: |
          # Fails if there are syntax errors or undefined names
          flake8 src/ --max-line-length=120 --exclude=__pycache__ --count --statistics
      
      - name: Run pylint
        run: |
          # Fails if the score is under 7.0
          pylint src/ --fail-under=7.0

      # TEST stage
      - name: Run unit and boundary tests
        env:
          CI: "true"
        run: |
          # Runs all tests in memory
          pytest tests/test_models.py tests/test_boundary_negative.py -v --tb=short

      - name: Run integration tests
        env:
          CI: "true"
        run: |
          pytest tests/test_integration.py -v --tb=short

      - name: Generate Coverage Report
        env:
          CI: "true"
        run: |
          # Generate coverage XML and HTML test report
          pytest --html=reports/test_report.html --self-contained-html --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Upload Test Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-python-${{ matrix.python-version }}
          path: |
            reports/test_report.html
            coverage.xml
          retention-days: 7

      # SECURITY SCAN stage
      - name: Run Bandit (Security Scan)
        run: |
          bandit -r src/ -ll > bandit_report.txt || true
          cat bandit_report.txt >> $GITHUB_STEP_SUMMARY

      - name: Run Safety (Dependency Vulnerability Scan)
        run: |
          safety check -r requirements.txt > safety_report.txt || true
          cat safety_report.txt >> $GITHUB_STEP_SUMMARY

      # BUILD stage (only runs on pull request / push to main in CD, but we verify build logic here)
      - name: Verify Build
        if: github.ref == 'refs/heads/main'
        run: |
          # Validate all required files are present
          python build_submission.py --check-only

      - name: Create Versioned ZIP (Main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          python build_submission.py
          mv hcbs_release.zip hcbs_v${{ github.run_number }}.zip

      - name: Upload ZIP Artifact (Main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: hcbs-release-${{ github.run_number }}
          path: hcbs_v${{ github.run_number }}.zip
