name: HCBS CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Manual approval via GitHub Environments
    environment: 
      name: production
      url: https://github.com/${{ github.repository }}/releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install DB Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Database Migrations
        run: |
          # Example of applying migrations or seeds to production
          # python seed_database.py --env=production
          echo "Production DB Migrations applied." >> $GITHUB_STEP_SUMMARY

      - name: Tag Release
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ github.run_number }}
          git push origin v${{ github.run_number }}

      - name: Post Deployment Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **Deployment to Production Successful!** Release tagged as v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment Failed!** Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi
